<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영월·제천 여행 2026 · 6/26~28</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --ink: #1C1A17;
    --sub: #6B6558;
    --rule: #D6D1C4;
    --accent: #3E6B52;
    --accent-light: #E8F0EB;
    --danger: #B84B3A;
    --day1: #3E6B52;
    --day2: #4A5F7A;
    --day3: #7A5A3E;
    --card: #FFFFFF;
    --shadow: 0 2px 12px rgba(28,26,23,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: #F7F5F0;
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 12px,
      rgba(255,255,255,0.025) 12px,
      rgba(255,255,255,0.025) 13px
    );
  }
  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(247,245,240,0.5);
    margin-bottom: 10px;
    position: relative;
  }
  header h1 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(26px, 6vw, 42px);
    font-weight: 800;
    letter-spacing: -0.01em;
    line-height: 1.2;
    position: relative;
  }
  header h1 em {
    font-style: normal;
    color: #8EC4A0;
  }
  .header-dates {
    margin-top: 12px;
    font-size: 13px;
    color: rgba(247,245,240,0.55);
    letter-spacing: 0.08em;
    position: relative;
  }

  /* ── MAIN LAYOUT ── */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  /* ── DAY SECTION ── */
  .day-block {
    margin-bottom: 36px;
  }
  .day-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--rule);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    padding-top: 8px;
  }
  .day-badge {
    font-family: 'Nanum Myeongjo', serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--accent);
    min-width: 48px;
  }
  .day-block[data-day="2"] .day-badge { color: var(--day2); }
  .day-block[data-day="3"] .day-badge { color: var(--day3); }
  .day-title {
    font-size: 13px;
    color: var(--sub);
    letter-spacing: 0.05em;
  }
  .day-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--rule);
    letter-spacing: 0.05em;
  }

  /* ── PLACE LIST ── */
  .place-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .place-item {
    background: var(--card);
    border-radius: 10px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    user-select: none;
    transition: box-shadow 0.15s, transform 0.15s, opacity 0.15s;
    touch-action: pan-y;
    position: relative;
  }
  .place-item:active { cursor: default; }
  .place-item.dragging {
    opacity: 0.5;
    transform: scale(0.98);
    box-shadow: 0 8px 24px rgba(28,26,23,0.14);
  }
  .place-item.drag-over {
    box-shadow: 0 0 0 2px var(--accent);
  }

  .drag-handle {
    color: var(--rule);
    font-size: 16px;
    flex-shrink: 0;
    line-height: 1;
    cursor: grab;
    padding: 6px 6px;
    touch-action: none;
    -webkit-user-select: none;
  }
  .drag-handle:active { cursor: grabbing; }

  .place-order {
    font-size: 11px;
    color: var(--rule);
    min-width: 18px;
    text-align: center;
    font-weight: 600;
  }

  .place-info {
    flex: 1;
    min-width: 0;
  }
  .place-name-link {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .place-name-link:hover {
    color: var(--accent);
    text-decoration: underline;
  }
  .place-memo {
    font-size: 12px;
    color: var(--sub);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
  }
  .place-memo.empty { color: var(--rule); font-style: italic; }

  .place-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    width: 30px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--sub);
    transition: background 0.12s, color 0.12s;
  }
  .btn-icon:hover { background: var(--bg); }
  .btn-icon.del:hover { background: #FDECEA; color: var(--danger); }

  /* ── ADD PLACE ── */
  .add-area {
    margin-top: 10px;
  }
  .btn-add {
    width: 100%;
    padding: 10px;
    background: none;
    border: 2px dashed var(--rule);
    border-radius: 10px;
    color: var(--sub);
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    font-family: 'Pretendard', sans-serif;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* ── SEARCH MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,26,23,0.55);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    width: 100%;
    max-width: 540px;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--rule);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal h3 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 17px;
    margin-bottom: 16px;
    color: var(--ink);
  }
  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .search-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Pretendard', sans-serif;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .btn-search {
    padding: 10px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Pretendard', sans-serif;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-search:hover { opacity: 0.85; }
  .search-hint {
    font-size: 11px;
    color: var(--sub);
    margin-bottom: 12px;
  }
  .search-results {
    max-height: 240px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .result-item {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--rule);
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }
  .result-item:hover { border-color: var(--accent); background: var(--accent-light); }
  .result-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .result-address { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .result-manual {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1.5px dashed var(--rule);
    cursor: pointer;
    font-size: 13px;
    color: var(--sub);
    text-align: center;
    transition: border-color 0.12s;
  }
  .result-manual:hover { border-color: var(--accent); color: var(--accent); }
  .search-loading {
    text-align: center;
    padding: 16px;
    color: var(--sub);
    font-size: 13px;
  }
  .modal-cancel {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    background: none;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    color: var(--sub);
    font-size: 13px;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
  }

  /* ── MEMO EDIT ── */
  .memo-input {
    width: 100%;
    margin-top: 4px;
    padding: 5px 8px;
    border: 1px solid var(--rule);
    border-radius: 5px;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    color: var(--ink);
    background: var(--bg);
    outline: none;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--rule);
    letter-spacing: 0.06em;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #F7F5F0;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 16px; margin: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Travel Plan · 2026</div>
  <h1>영월 <em>·</em> 제천<br>여행 일정</h1>
  <div class="header-dates">June 26 – 28, 2026 &nbsp;·&nbsp; 2박 3일</div>
</header>

<main id="app"></main>

<footer>장소를 클릭하면 네이버 지도로 연결됩니다 &nbsp;·&nbsp; 드래그로 순서 변경</footer>

<div id="toast"></div>

<!-- 검색 모달 -->
<div class="modal-overlay" id="searchModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>장소 추가</h3>
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="장소 이름 검색 (예: 청령포)" autocomplete="off">
      <button class="btn-search" onclick="searchPlaces()">검색</button>
    </div>
    <div class="search-hint">* 네이버 지도에서 장소를 검색하여 추가합니다</div>
    <div class="search-results" id="searchResults"></div>
    <button class="modal-cancel" onclick="closeModal()">취소</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const DAYS = [
  {
    label: '첫째 날', date: '6/26 (금)',
    places: [
      { name: '제천역', memo: '출발 기점', query: '제천역' },
      { name: '청령포', memo: '단종 유배지', query: '청령포' },
      { name: '영월 서부시장', memo: '', query: '영월서부시장' },
      { name: '카페 중부내륙', memo: '', query: '카페 중부내륙 영월' },
      { name: '장릉', memo: '단종의 능', query: '장릉 영월' },
      { name: '청솔식당', memo: '저녁', query: '청솔식당 영월' },
      { name: '하운드호텔', memo: '숙소', query: '하운드호텔 영월' },
    ]
  },
  {
    label: '둘째 날', date: '6/27 (토)',
    places: [
      { name: '소롯길', memo: '아침 산책', query: '소롯길 영월' },
      { name: '소롯길 식당', memo: '점심', query: '소롯길식당 영월' },
      { name: '젊은달와이파크', memo: '', query: '젊은달와이파크' },
      { name: '인도미술박물관', memo: '', query: '인도미술박물관 영월' },
      { name: '대보명가', memo: '저녁', query: '대보명가 영월' },
      { name: '카페 우주산책', memo: '카페타임', query: '카페 우주산책 영월' },
      { name: '하운드호텔', memo: '숙소', query: '하운드호텔 영월' },
    ]
  },
  {
    label: '셋째 날', date: '6/28 (일)',
    places: [
      { name: '그래도팜', memo: '', query: '그래도팜' },
    ]
  }
];

// 런타임 데이터
let days = DAYS.map((d, i) => ({
  ...d,
  id: i,
  places: d.places.map((p, j) => ({ ...p, id: `${i}-${j}-${Date.now()}` }))
}));

let addingToDay = null;
let dragSrc = null;
let dragSrcDay = null;

// ── NAVER MAP LINK ────────────────────────────────────────────────────────
function naverMapLink(query) {
  return `https://map.naver.com/v5/search/${encodeURIComponent(query)}`;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  days.forEach((day, di) => {
    const block = document.createElement('div');
    block.className = 'day-block';
    block.dataset.day = di + 1;

    block.innerHTML = `
      <div class="day-header">
        <span class="day-badge">Day ${di+1}</span>
        <span class="day-title">${day.date} · ${day.label}</span>
        <span class="day-count">${day.places.length}곳</span>
      </div>
      <div class="place-list" id="list-${di}"></div>
      <div class="add-area">
        <button class="btn-add" onclick="openModal(${di})">+ 장소 추가</button>
      </div>
    `;
    app.appendChild(block);

    const list = block.querySelector(`#list-${di}`);
    day.places.forEach((place, pi) => {
      list.appendChild(makePlaceItem(place, di, pi));
    });
    setupDragDrop(list, di);
  });
}

function makePlaceItem(place, di, pi) {
  const item = document.createElement('div');
  item.className = 'place-item';
  item.draggable = true;
  item.dataset.id = place.id;

  item.innerHTML = `
    <span class="drag-handle">⠿</span>
    <span class="place-order">${pi + 1}</span>
    <div class="place-info">
      <a class="place-name-link" href="${naverMapLink(place.query || place.name)}" target="_blank" rel="noopener">${place.name}</a>
      <div class="place-memo ${place.memo ? '' : 'empty'}" onclick="editMemo(this, '${di}','${place.id}')">${place.memo || '메모 추가…'}</div>
    </div>
    <div class="place-actions">
      <button class="btn-icon del" onclick="removePlace(${di},'${place.id}')" title="삭제">✕</button>
    </div>
  `;

  // 드래그 이벤트
  item.addEventListener('dragstart', e => {
    dragSrc = place.id;
    dragSrcDay = di;
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  item.addEventListener('dragend', () => {
    item.classList.remove('dragging');
    document.querySelectorAll('.place-item').forEach(el => el.classList.remove('drag-over'));
  });

  // 터치 드래그 (모바일)
  setupTouchDrag(item, di, place.id);

  return item;
}

// ── DRAG & DROP (Mouse) ──────────────────────────────────────────────────
function setupDragDrop(list, di) {
  list.addEventListener('dragover', e => {
    e.preventDefault();
    const target = e.target.closest('.place-item');
    if (!target) return;
    document.querySelectorAll('.place-item').forEach(el => el.classList.remove('drag-over'));
    if (target.dataset.id !== dragSrc) target.classList.add('drag-over');
  });
  list.addEventListener('drop', e => {
    e.preventDefault();
    const target = e.target.closest('.place-item');
    if (!target || target.dataset.id === dragSrc) return;
    const destId = target.dataset.id;
    reorder(dragSrcDay, di, dragSrc, destId);
  });
}

function reorder(fromDay, toDay, srcId, destId) {
  const src = days[fromDay].places.find(p => p.id === srcId);
  if (!src) return;
  days[fromDay].places = days[fromDay].places.filter(p => p.id !== srcId);
  const destIdx = days[toDay].places.findIndex(p => p.id === destId);
  days[toDay].places.splice(destIdx, 0, src);
  render();
}

// ── TOUCH DRAG (Mobile) — 핸들에서만 시작 ───────────────────────────────
function setupTouchDrag(item, di, placeId) {
  const handle = item.querySelector('.drag-handle');
  if (!handle) return;

  let startClientY, startClientX, startScrollY, clone, isDragging = false;

  handle.addEventListener('touchstart', e => {
    e.stopPropagation();
    const t = e.touches[0];
    startClientY = t.clientY;
    startClientX = t.clientX;
    startScrollY = window.scrollY;
    dragSrc = placeId; dragSrcDay = di;
    isDragging = false;
  }, { passive: true });

  handle.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    // 현재 스크롤 위치 반영한 실제 이동 거리
    const dy = t.clientY - startClientY;
    const dx = t.clientX - startClientX;

    if (!isDragging && (Math.abs(dy) > 4 || Math.abs(dx) > 4)) {
      isDragging = true;
      const rect = item.getBoundingClientRect();
      clone = item.cloneNode(true);
      clone.style.cssText = `
        position:fixed;
        left:${rect.left}px;
        top:${rect.top}px;
        width:${rect.width}px;
        opacity:0.85; z-index:999;
        pointer-events:none;
        box-shadow:0 8px 24px rgba(0,0,0,0.2);
        transition:none;
      `;
      document.body.appendChild(clone);
      item.style.opacity = '0.3';
    }

    if (!clone) return;

    // fixed position이므로 clientY 기준 이동 (스크롤 무관)
    clone.style.transform = `translate(${dx}px,${dy}px)`;

    // 현재 손가락 위치의 실제 엘리먼트 찾기
    clone.style.visibility = 'hidden';
    const el = document.elementFromPoint(t.clientX, t.clientY);
    clone.style.visibility = '';
    const target = el?.closest?.('.place-item');
    document.querySelectorAll('.place-item').forEach(el => el.classList.remove('drag-over'));
    if (target && target.dataset.id !== placeId) target.classList.add('drag-over');
  }, { passive: false });

  handle.addEventListener('touchend', e => {
    if (!isDragging || !clone) { isDragging = false; return; }
    const t = e.changedTouches[0];
    clone.style.visibility = 'hidden';
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const target = el?.closest?.('.place-item');
    if (target && target.dataset.id && target.dataset.id !== placeId) {
      const listEl = target.closest('.place-list');
      const destDayIdx = [...document.querySelectorAll('.place-list')].indexOf(listEl);
      reorder(di, destDayIdx >= 0 ? destDayIdx : di, placeId, target.dataset.id);
    }
    clone.remove(); clone = null;
    isDragging = false;
    item.style.opacity = '';
    document.querySelectorAll('.place-item').forEach(el => el.classList.remove('drag-over'));
  });
}

// ── PLACE REMOVE ─────────────────────────────────────────────────────────
function removePlace(di, id) {
  days[di].places = days[di].places.filter(p => p.id !== id);
  render();
}

// ── MEMO EDIT ─────────────────────────────────────────────────────────────
function editMemo(el, di, id) {
  if (el.querySelector('input')) return;
  const place = days[di].places.find(p => p.id === id);
  if (!place) return;
  const input = document.createElement('input');
  input.className = 'memo-input';
  input.value = place.memo || '';
  input.placeholder = '메모를 입력하세요';
  el.replaceWith(input);
  input.focus();
  const save = () => {
    place.memo = input.value.trim();
    render();
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(di) {
  addingToDay = di;
  document.getElementById('searchModal').classList.add('open');
  document.getElementById('searchResults').innerHTML = '';
  const inp = document.getElementById('searchInput');
  inp.value = '';
  inp.focus();
}
function closeModal() {
  document.getElementById('searchModal').classList.remove('open');
  addingToDay = null;
}
document.getElementById('searchModal').addEventListener('click', e => {
  if (e.target === document.getElementById('searchModal')) closeModal();
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchPlaces();
});

// ── NAVER PLACE SEARCH (공개 API 없으므로 검색 페이지 기반) ─────────────
async function searchPlaces() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const box = document.getElementById('searchResults');
  box.innerHTML = `<div class="search-loading">검색 중…</div>`;

  // Naver 지역 검색 (CORS 제한으로 클라이언트에서 직접 호출 불가)
  // 대신 Claude API로 장소 정보 추천
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 800,
        system: `사용자가 한국 여행지 장소를 검색합니다. 검색어에 맞는 실제 한국 장소를 최대 5개 JSON 배열로만 응답하세요. 절대 다른 텍스트 없이 JSON만 출력하세요.
형식: [{"name":"장소명","address":"주소","query":"네이버 지도 검색용 키워드"}]
주소는 실제 행정주소를 짧게, query는 네이버지도에서 정확히 검색될 키워드로.`,
        messages: [{ role: 'user', content: `"${q}" 장소 검색 (영월, 제천, 강원도 위주)` }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text || '').join('') || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const places = JSON.parse(clean);

    box.innerHTML = '';
    places.forEach(p => {
      const el = document.createElement('div');
      el.className = 'result-item';
      el.innerHTML = `<div class="result-name">${p.name}</div><div class="result-address">${p.address}</div>`;
      el.onclick = () => addPlace(p.name, p.query || p.name, '');
      box.appendChild(el);
    });

    // 직접 입력 옵션
    const manual = document.createElement('div');
    manual.className = 'result-manual';
    manual.textContent = `"${q}" 이름 그대로 추가하기`;
    manual.onclick = () => addPlace(q, q, '');
    box.appendChild(manual);

  } catch (e) {
    // fallback: 직접 입력만
    box.innerHTML = '';
    const manual = document.createElement('div');
    manual.className = 'result-manual';
    manual.textContent = `"${q}" 이름 그대로 추가하기`;
    manual.onclick = () => addPlace(q, q, '');
    box.appendChild(manual);
  }
}

function addPlace(name, query, memo) {
  if (addingToDay === null) return;
  days[addingToDay].places.push({
    id: `new-${Date.now()}`,
    name, query, memo
  });
  closeModal();
  render();
  showToast(`"${name}" 추가됨`);
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ─────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
